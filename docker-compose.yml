services:
  api:
    image: ${DOCKERHUB_USERNAME}/equiledger:latest
    restart: always
    env_file: .env
    # Ensures production behavior (e.g. sanitized API errors) even if NODE_ENV is missing from .env.
    # Override in .env: set NODE_ENV=development for a local/staging stack when needed.
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./.env:/app/.env
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config: